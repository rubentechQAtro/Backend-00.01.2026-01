$kind: http-request
name: '12 - Consultar datos ficticios de un usuario'
method: GET
url: 'https://randomuser.me/api/?results=5&nat=es'
description: 'Genera datos ficticios de usuarios aleatorios usando RandomUser.me. Gratuita, sin autenticación. nat=es para usuarios de habla hispana.'
order: 12000
queryParams:
  - key: results
    value: '5'
  - key: nat
    value: es
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Usuarios generados", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Tiene lista de usuarios", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.results).to.be.an("array");
          pm.expect(jsonData.results.length).to.equal(5);
      });

      var data = pm.response.json();
      data.results.forEach(u => {
          console.log("Usuario:", u.name.first, u.name.last);
          console.log("Email:", u.email);
      });
