<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagina</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <body class="bg-zinc-50 text-zinc-950 min-h-screen">
      <header
        class="border-b border-zinc-800 px-6 py-4 flex items-center gap-3"
      >
        <span class="text-2x"><i class="bi bi-hammer"></i></span>
        <div>
          <h1 class="text-dark font-extrabold tracking-tight leading-none">
            Servicio tecnico
          </h1>
          <p class="text-success font-extrabold tracking-tight leading-none">
            Reparacion de moviles
          </p>
          <p class="text-dark fst-italic font-extrabold">
            Soluciones rápidas y confiables para tu dispositivo móvil.
          </p>
        </div>
      </header>

      <div class="flex h-[calc(100vh-65px)]">
        <aside class="w-64 border-r border-zinc-800 p-5 flex flex-col shrink-0">
          <p
            class="text-xs font-bold uppercase tracking-widest mb-3 text-dark fst-italic text-center"
          >
            Flujo de reparaciones <i class="bi bi-arrow-clockwise"></i>
          </p>

          <!-- paso a paso -->
          <div id="stepper" class="flex flex-col gap-3"></div>

          <div
            id="telActivo"
            class="hidden mt-auto border border-primary rounded-xl p-3"
          >
            <p class="text-xs text-black mb-1 font-extrabold "><i class="bi bi-shuffle text-black"></i> Equipo en flujo</p>
            <p
              id="telActivoNombre"
              class="text-sm font-bold text-white leading-tight"
            ></p>
            <p id="telActivoSerie" class="text-xs text-zinc-400"></p>
            <span
              id="telActivoEstado"
              class="inline-block mt-1 text-xs px-2 py-0.5 rounded-full border font-bold"
            ></span>
          </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
          <div class="flex-1 overflow-y-auto p-8">
            <div id="stepContent"></div>
          </div>
        </main>
      </div>

      <template id="tpl-0">
        <div class="max-w-lg mx-auto pt-8 step-panel">
          <div class="text-center fs-1 mb-4">
            <i class="bi bi-house-fill"></i>
          </div>
          <h2
            class="text-3xl font-extrabold mb-2 text-success tracking-tight leading-none text-center"
          >
            Bienvenido al sistema
          </h2>
          <p
            class="text-dark fst-italic font-extrabold mb-8 leading-relaxed text-center"
          >
            Pasos para la reparacion de su dispositivo movil:
          </p>

          <div class="grid grid-cols-3 gap-3 mb-8 text-left">
            <div class="border border-primary rounded-xl p-4">
              <div class="text-2xl mb-1 text-center">
                <i class="bi bi-1-circle"></i>
              </div>
              <p
                class="text-xs text-zinc-500 text-center fst-italic font-extrabold"
              >
                Registrar Equipo
              </p>
              <p class="text-xs text-zinc-400 text-center fst-italic">
                Validar serie e IMEI
              </p>
            </div>

            <div class="border border-primary rounded-xl p-4">
              <div class="text-2xl mb-1 text-center">
                <i class="bi bi-2-circle"></i>
              </div>
              <p
                class="text-xs text-zinc-500 text-center fst-italic font-extrabold"
              >
                Diagnostico
              </p>
              <p class="text-xs text-zinc-400 text-center fst-italic">
                Primera revision
              </p>
            </div>

            <div class="border border-primary rounded-xl p-4">
              <div class="text-2xl mb-1 text-center">
                <i class="bi bi-3-circle"></i>
              </div>
              <p
                class="text-xs text-zinc-500 text-center fst-italic font-extrabold"
              >
                Autorizacion
              </p>
              <p class="text-xs text-zinc-400 text-center fst-italic">
                Firma + abono
              </p>
            </div>

            <div class="border border-primary rounded-xl p-4">
              <div class="text-2xl mb-1 text-center">
                <i class="bi bi-4-circle"></i>
              </div>
              <p
                class="text-xs text-zinc-500 text-center fst-italic font-extrabold"
              >
                Asignar Tecnico
              </p>
              <p class="text-xs text-zinc-400 text-center fst-italic">
                Asignar y validar skill
              </p>
            </div>

            <div class="border border-primary rounded-xl p-4">
              <div class="text-2xl mb-1 text-center">
                <i class="bi bi-5-circle"></i>
              </div>
              <p
                class="text-xs text-zinc-500 text-center fst-italic font-extrabold"
              >
                Repuesto
              </p>
              <p class="text-xs text-zinc-400 text-center fst-italic">Piezas</p>
            </div>

            <div class="border border-primary rounded-xl p-4">
              <div class="text-2xl mb-1 text-center">
                <i class="bi bi-6-circle"></i>
              </div>
              <p
                class="text-xs text-zinc-500 text-center fst-italic font-extrabold"
              >
                Estado Final
              </p>
              <p class="text-xs text-zinc-400 text-center fst-italic">
                Resumen completo
              </p>
            </div>
          </div>

          <div class="d-flex justify-content-center">
            <button onclick="goStep(1)" class="btn btn-outline-primary">
              Comenzar <i class="bi bi-hand-thumbs-up-fill"></i>
            </button>
          </div>
        </div>
      </template>

      <template id="tpl-1">
        <div class="max-w-md mx-auto step-panel">
          <div class="flex items-center gap-3 mb-6">
            <span
              class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-sm shrink-0"
              >1</span
            >
            <div>
              <h2 class="text-xl font-extrabold text-center fst-italic">
                Registrar Telefono
              </h2>
              <p class="text-zinc-500 text-xs fst-italic">
                Valida que el IMEI y numero de serie no esten reportados
              </p>
            </div>
          </div>

          <div
            class="rounded-xl p-2 mb-3 text-xs alert alert-danger text-center"
          >
            <strong>
              <i class="bi bi-exclamation-octagon"></i> Lista negra :
            </strong>
            Serie: <code>123123123</code> IMEI:
            <code>ASDJKHASDKJ</code>
          </div>
        </div>

        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-dark italic mb-1 block font-extrabold"
                >Numero de Serie:</label
              >
              <input
                id="s1_serie"
                type="text"
                placeholder="Ej: SN12312312"
                class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
              />
            </div>

            <div>
              <label class="text-xs text-dark italic mb-1 block font-extrabold"
                >IMEI:</label
              >
              <input
                id="s1_imei"
                type="text"
                placeholder="Ej: IMEI12312312"
                class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
              />
            </div>

            <div>
              <label class="text-xs text-dark italic mb-1 block font-extrabold"
                >Marca:</label
              >
              <input
                id="s1_marca"
                type="text"
                placeholder="Ej: Marca"
                class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
              />
            </div>

            <div>
              <label class="text-xs text-dark italic mb-1 block font-extrabold"
                >Modelo:</label
              >
              <input
                type="text"
                id="s1_modelo"
                placeholder="Ej: Modelo"
               class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
              />
            </div>

            <div>
              <label class="text-xs text-dark italic mb-1 block font-extrabold"
                >Propietario:</label
              >
              <input
                id="s1_prop"
                type="text"
                placeholder="Ej: Juan Perez"
                class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
              />
            </div>
          </div>

          <div class="flex justify-end mt-5">
            <button
              onclick="step1Action()"
              class="btn btn-outline-primary"
            >
              Registrar y Continuar
            </button>
          </div>
        </div>
      </template>

      <template id="tpl-2">
        <div class="max-w-md mx-auto step-panel">
          <div class="flex items-center gap-3 mb-6">
            <span
              class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-sm shrink-0"
              >2</span
            >
            <div>
              <h2 class="text-xl font-extrabold text-center italic">Primera Revision</h2>
              <p class="text-zinc-500 text-xs text center">
                Se hace el diagnostico inicial y el costo estimado
              </p>
            </div>
          </div>
        </div>
        <div
          id="s2_telInfo"
          class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 mb-5"
        ></div>
        <div class="space-y-3">
          <div>
            <label class="text-xs text-dark italic mb-1 block font-extrabold"
              >Descripcion del problema:</label
            >
            <textarea
              id="s2_desc"
              rows="3"
              placeholder="Ej: La pantalla esta rota y el flex del audio danado..."
              class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
            ></textarea>
          </div>
          <div>
            <label class="text-xs text-dark italic mb-1 block font-extrabold"
              >Costo Estiamdo (s/)</label
            >
            <input
              id="s2_costo"
              type="numer"
              placeholder="Ej: 320"
              class=" bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
            />
          </div>

          <div class="flex justify-between mt-5">
            <button
              onclick="goStep(1)"
              class="btn btn-outline-warning"
            >
              Volver atras <i class="bi bi-sign-turn-left-fill"></i>
            </button>
            <button
              onclick="step2Action()"
              class="btn btn-outline-success"
            >
              Guardar Diagnostico <i class="bi bi-bookmark-check-fill"></i>
            </button>
          </div>
        </div>
      </template>

      <template id="tpl-3">
        <div class="max-w-md mx-auto step-panel">
          <div class="flex items-center gap-3 mb-6">
            <span
              class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-sm shrink-0"
              >3</span
            >
            <div>
              <h2 class="text-xl font-extrabold text-center italic">Autorizacion + Abono</h2>
              <p class="text-zinc-500 text-xs text-center ">
                El cliente firma y paga el 50% del costo estimado
              </p>
            </div>
          </div>

          <div
            id="s3_telInfo"
            class="border border-success bg-success text-dark bg-opacity-10 rounded-xl p-4 mb-5"
          ></div>

          <div
            class="bg-purple-900 border border-purple-700/30 rounded-xl pb-4 mb-5 text-center"
          >
            <p class="text-zinc-400 text-xs mb-1">
              Costo total de reparaciones
            </p>

            <p
              id="s3_costoTotal"
              class="text-3xl font-extrabold text-white mb-3"
            ></p>
            <div class="bg-purple-600/20 rounded-lg p-3">
              <p class="text-purple-300 text-xs mb-1">Abono requerido (50%)</p>
              <p
                id="s3_abono"
                class="text-2xl font-extrabold text-purple-300"
              ></p>
            </div>
          </div>

          <label
            class="flex items-start gap-3 bg-zinc-900 borde border-zinc-800 rounded-xl p-4 cursor-pointer mb-4 hover:border-purple-600 transition"
          >
            <input
              type="checkbox"
              id="s3_check"
              class="mt-0.5 accent-green-500 shrink-0"
            />
            <div>
              <p class="text-sm font-bold text-center">Autorizacion del cliente</p>
              <p class="text-xs text-zinc-400 mt-0.5 text-center">
                El cliente acepta los terminos y condiciones
              </p>
            </div>
          </label>

          <div class="flex justify-between mt-5">
            <button
              onclick="goStep(2)"
              class="btn btn-outline-warning"
            >
               Volver atras <i class="bi bi-reply"></i>
            </button>
            <button
              onclick="step3Action()"
              class="btn btn-outline-success"
            >
              Confirmar Autorizacion <i class="bi bi-check2"></i>
            </button>
          </div>
        </div>
      </template>

      <template id="tpl-4">
        <div class="max-w-md mx-auto step-panel">
          <div class="flex items-center gap-3 mb-6">
            <span
              class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-sm shrink-0"
              >4</span
            >
            <div>
              <h2 class="text-xl font-extrabold text-center">Asignar Tecnico</h2>
              <p class="text-zinc-500 text-xs text-center">
                Solo asignar tecnicos con el skill de la marca seleccionada
              </p>
            </div>
          </div>

          <div
            id="s4_telInfo"
            class="bg-white rounded-xl p-4 mb-5"
          ></div>

          <div id="s4_tecnicos" class="space-y-2 mb-5"></div>

          <div class="flex justify-between mt-5">
            <button
              onclick="goStep(3)"
              class="btn btn-outline-warning"
            >
            Volver atras <i class="bi bi-reply"></i>
            </button>
            </button>
            <button
              onclick="step4Action()"
              class="btn btn-outline-success"
            >
          Confirmar Autorizacion <i class="bi bi-check2"></i>
            </button>
          </div>
        </div>
      </template>

      <template id="tpl-5">
        <div class="max-w-md mx-auto step-panel">
          <div class="flex items-center gap-3 mb-6">
            <span
              class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-sm shrink-0"
              >5</span
            >
            <div>
              <h2 class="text-xl font-extrabold italic text-center">Agregar Repuestos</h2>
              <p class="text-zinc-500 text-xs text-center">Registra las piezas usadas</p>
            </div>
          </div>

          <div
            id="s5_telInfo"
            class="border border-primary rounded-xl p-4 mb-5"
          ></div>

          <div class="space-y-3 mb-4">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-xs black mb-1 block font-extrabold"
                  >Nombre del repuesto</label
                >
                <input
                  id="s5_nombre"
                  type="text"
                  id="s5_nombre"
                  placeholder="Ej: pantalla AMOLED "
                  class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
                />
              </div>
              <div>
                <label class="text-xs black mb-1 block font-extrabold">Precio</label>
                <input
                  id="s5_precio"
                  type="number"
                  class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:outline-none focus:ring-0 rounded-lg px-3 py-2.5 text-sm placeholder-zinc-200 transition"
                />
              </div>
            </div>
            <button
              onclick="step5AddRepuesto()"
              class="w-full bg-orange-500/20 hover:bg-orange-500/30 border border-orange-500 rounded-lg px-3 py-2.5 text-sm text-orange-300 transition"
            >
               <i class="bi bi-basket"></i> Agregar respuesto
            </button>
          </div>

          <div id="s5_lista" class="space-y-1 mb-3"></div>

          <div
            id="s5_total"
            class="hidden bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-right mb-4 text-white"
          >
            <span class="text-zinc-400 text-xs">total repuestos:</span>
            <span
              id="s5_totalNum"
              class="text-orange-400 font-extrabold text-lg"
              >s/ 0</span
            >
          </div>

          <div class="flex justify-between mt-5">
            <button
              onclick="goStep(4)"
              class="btn btn-outline-warning"
            >
               Volver atras <i class="bi bi-reply"></i>
            </button>
            <button
              onclick="goStep(6)"
              class="btn btn-outline-info"
            >
              Ver estado Final <i class="bi bi-clipboard-check"></i>
            </button>
          </div>
        </div>
      </template>

      <template id="tpl-6">
        <div class="max-w-md mx-auto step-panel">
          <div class="flex items-center gap-3 mb-6">
            <span
              class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-sm shrink-0"
              >6</span
            >
            <div>
              <h2 class="text-xl font-extrabold text-center italic ">
                Estado Final Del dispositivo
              </h2>
              <p class="text-zinc-500 text-xs text-center">Resumen de las estaciones</p>
            </div>
          </div>

          <div
            id="s6_contenido"
            class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 mb-5"
          ></div>

          <div class="flex justify-between mt-5">
            <button
              onclick="goStep(5)"
              class="btn btn-outline-warning"
            >
             Volver atras <i class="bi bi-reply"></i>
            </button>
            <button
              onclick="resetAll()"
              class="btn btn-outline-info"
            >
              Nueva repacion <i class="bi bi-plus-square-dotted"></i>
            </button>
          </div>
        </div>
      </template>
    </body>

    <script src="script.js"></script>
  </body>
</html>
