<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Reparaciones</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Sistema Reparación de Celulares</h1>

    <div class="card p-4 shadow">

        <h4>Registrar reparación</h4>

        <input id="cliente" class="form-control mb-2" placeholder="Nombre cliente">
        <input id="doc" class="form-control mb-2" placeholder="Documento">
        <input id="serie" class="form-control mb-2" placeholder="Serie teléfono">
        <input id="imei" class="form-control mb-2" placeholder="IMEI">
        <input id="marca" class="form-control mb-2" placeholder="Marca">

        <button id="btnRegistrar" class="btn btn-primary w-100">
            Registrar Equipo
        </button>

    </div>

    <div class="card p-4 shadow mt-4">

        <h4>Lista Reparaciones</h4>

        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Cliente</th>
                    <th>Marca</th>
                    <th>IMEI</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
