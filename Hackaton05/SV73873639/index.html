<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHFIX PRO // SISTEMA DE GESTIÓN 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>

    <div id="modal-alert" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">⚠️ AVISO DE SISTEMA</div>
            <p id="modal-msg"></p>
            <button onclick="cerrarModal()" class="btn-neon-pink">ENTENDIDO</button>
        </div>
    </div>

    <div class="container">
        <header class="main-header">
            <h1>TECHFIX PRO</h1>
            <p>GESTIÓN TÉCNICA PROFESIONAL - SEDE CENTRAL</p>
        </header>

        <div class="progress-card card">
            <div class="progress-track">
                <div class="progress-fill" id="main-progress"></div>
            </div>
            <div class="steps-labels">
                <div class="step-tag">REGISTRO</div>
                <div class="step-tag">REVISIÓN</div>
                <div class="step-tag">AUTORIZACIÓN</div>
                <div class="step-tag">TALLER</div>
                <div class="step-tag">ENTREGA</div>
            </div>
        </div>

        <main id="app-viewport">
            <section class="card" id="section-ingreso">
                <h2 class="section-title">1. Registro de Dispositivo</h2>
                <form id="repair-form">
                    <div class="field-grid">
                        <div class="field-group">
                            <label>MARCA</label>
                            <select id="marca" required onchange="cargarModelos()">
                                <option value="" disabled selected>SELECCIONAR MARCA</option>
                                <option value="Oppo">OPPO</option>
                                <option value="Apple">APPLE</option>
                                <option value="Samsung">SAMSUNG</option>
                                <option value="Xiaomi">XIAOMI</option>
                                <option value="Realme">REALME</option>
                                <option value="Honor">HONOR</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>MODELO</label>
                            <select id="modelo" required disabled>
                                <option value="" disabled selected>ESPERANDO SELECCIÓN...</option>
                            </select>
                        </div>
                    </div>
                    <div class="field-group">
                        <label>NÚMERO DE SERIE (EXACTO: 10 DÍGITOS)</label>
                        <input type="text" id="serie" maxlength="10" required placeholder="Ej: 0023456789" oninput="validarDigitos(this)">
                    </div>
                    <div class="field-group">
                        <label>IMEI DEL EQUIPO (EXACTO: 15 DÍGITOS)</label>
                        <input type="text" id="imei" maxlength="15" required placeholder="Ej: 356789012345678" oninput="validarDigitos(this)">
                    </div>
                    <button type="submit" class="btn-neon-blue">VALIDAR E INGRESAR DISPOSITIVO →</button>
                </form>
            </section>

            <section class="card hidden" id="section-fases">
                <h2 class="section-title">2. Gestión de Estación de Trabajo</h2>
                <div id="status-display" class="status-box"></div>
                <div id="fase-dinamica" class="fase-content"></div>
                <button onclick="siguienteFase()" class="btn-neon-pink" id="btn-next">CONFIRMAR FASE Y AVANZAR →</button>
            </section>
        </main>

        <section class="card">
            <h2 class="section-title">Historial del Proceso (Trazabilidad)</h2>
            <div id="process-history" class="timeline">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
