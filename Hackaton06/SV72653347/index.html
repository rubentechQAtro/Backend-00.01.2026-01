<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Reparaciones</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h3>Registro Reparación</h3>

<input id="cliente" placeholder="Cliente" class="form-control mb-2">
<input id="doc" placeholder="Documento" class="form-control mb-2">
<input id="serie" placeholder="Serie" class="form-control mb-2">
<input id="imei" placeholder="IMEI" class="form-control mb-2">
<input id="marca" placeholder="Marca" class="form-control mb-2">

<button id="btnRegistrar" class="btn btn-primary">Registrar</button>

<hr>

<table class="table table-bordered">
<thead>
<tr>
<th>Cliente</th>
<th>Marca</th>
<th>IMEI</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
